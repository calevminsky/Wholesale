name: Resync catalog

# Durable catalog resync: re-pulls pre-order products/images/prices from pd
# (the yb_reports DB's pd.* schema) and rebuilds from the same DB (in-stock
# products/prices/inventory), then commits the refreshed catalog so Render
# redeploys it. Because the result is committed to git, it survives every
# redeploy/restart. Emily's removals are not touched — they live in Postgres
# and are applied at serve time.
on:
  schedule:
    - cron: "0 10 * * *"          # ~6am ET (10:00 UTC); shifts 1h with DST — adjust if needed
  workflow_dispatch: {}            # "Run workflow" button in the Actions tab
  repository_dispatch:
    types: [resync]                # fired by the /admin "Resync & publish" button

permissions:
  contents: write

concurrency:
  group: resync
  cancel-in-progress: false

jobs:
  resync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Pull pd pre-orders + rebuild catalog
        working-directory: wholesale-portal
        env:
          REPORTING_DATABASE_URL: ${{ secrets.REPORTING_DATABASE_URL }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
        run: |
          node build/airtable-preorder.mjs
          node build/build-catalog.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "yb-resync-bot"
          git config user.email "noreply@yakirabella.com"
          git add wholesale-portal/build/airtable-preorder.json wholesale-portal/build/handles.cache.json wholesale-portal/data
          if git diff --cached --quiet; then
            echo "No changes — catalog already up to date."
          else
            git commit -m "Auto-resync catalog (products/images/prices/ETAs/inventory)"
            git push
          fi
      - name: Trigger Render redeploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s "$RENDER_DEPLOY_HOOK"
            echo "Render redeploy triggered."
          fi
