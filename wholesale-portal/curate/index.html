<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yakira Bella — Remove Products</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- reuse the buyer line-sheet styles for an identical card layout -->
<link rel="stylesheet" href="/styles.css">
<style>
  /* curate-specific bits layered on top of the line-sheet styles */
  .acct{color:var(--muted);font-size:13px;margin-top:6px}
  .card{cursor:pointer}
  .card.marked{outline:2px solid var(--accent);outline-offset:-2px;box-shadow:0 0 0 2px var(--accent),var(--shadow)}
  .card.marked .imgwrap{opacity:.55}
  .removechk{position:absolute;top:8px;right:8px;z-index:2;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--ink)}
  .removechk input{width:16px;height:16px;accent-color:var(--accent);margin:0}
  .card.marked .removechk{background:var(--accent);color:#fff;border-color:var(--accent)}
  .markedflag{display:none;position:absolute;left:8px;top:8px;z-index:2;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .card.marked .markedflag{display:inline-block}
  /* read-only inventory row (reuses .sizerun/.sizecell/.sz/.av) */
  .invhead{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .sizecell .av{font-size:13px;font-weight:600;color:var(--ink)}
  .sizecell .av.zero{color:var(--off)}
  .invtotal{font-size:11.5px;color:var(--muted)}
  .invtotal b{color:var(--ink)}
  .prenote{font-size:11.5px;color:var(--amber);background:var(--amber-soft);border:1px solid #e9d3a6;border-radius:8px;padding:6px 9px}
  /* removed / restore */
  .section{margin:6px 0 0}
  .section h2{font-family:Fraunces,serif;font-size:17px;margin:18px 0 8px}
  .removed{display:flex;flex-wrap:wrap;gap:8px}
  .rchip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px}
  .rchip button{border:0;background:transparent;color:var(--accent);font:inherit;font-weight:600;cursor:pointer;text-decoration:underline}
  .status{font-size:13px;color:var(--muted)}.status.ok{color:var(--full)}.status.err{color:var(--accent)}
  .log{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;white-space:pre-wrap;background:#211C17;color:#f3ebe2;border-radius:9px;padding:12px 14px;margin-top:12px;max-height:180px;overflow:auto;display:none}
</style>
</head>
<body>

<header class="top">
  <div class="wrap headrow">
    <div class="brand">
      <h1><span class="sub">Yakira Bella · Wholesale</span>Remove products</h1>
      <div class="acct">Tick the styles to take off the line sheet, then press <b>Remove selected</b>. Buyers stop seeing them right away.</div>
    </div>
    <div class="cartmini">
      <div class="stat"><div class="n" id="selCount">0</div><div class="l">Selected</div></div>
      <button class="btn primary" id="removeBtn" disabled>Remove selected</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="wrap">
    <div class="tierbar" id="classSeg">
      <button class="tiertab on" data-v="">All <span class="b" id="cAll">0</span></button>
      <button class="tiertab" data-v="noncore">Non-Core <span class="b" id="cNonCore">0</span></button>
      <button class="tiertab" data-v="core">Core <span class="b" id="cCore">0</span></button>
    </div>
    <div class="row">
      <label class="search"><input id="q" type="search" placeholder="Search style or color…" autocomplete="off"></label>
      <select id="fType"><option value="">Any type</option></select>
      <select id="sort">
        <option value="title_asc">Title A→Z</option>
        <option value="inv_desc">Most on hand</option>
        <option value="inv_asc">Least on hand</option>
      </select>
      <div class="seg" id="densitySeg">
        <button data-v="comfortable" class="on">Comfy</button>
        <button data-v="compact">Compact</button>
      </div>
      <span class="count" id="count">0 styles</span>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"><div class="big">No styles match</div><div>Try clearing the search or filter.</div></div>
  <div class="section" id="removedSection" style="display:none">
    <h2>Currently removed</h2>
    <div class="removed" id="removed"></div>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="cartbar" id="bar">
  <div class="wrap inner">
    <span class="status" id="status">Loading…</span>
    <div class="spacer"></div>
    <button class="btn ghost sm" id="clearSel">Clear selection</button>
    <button class="btn primary" id="removeBtn2" disabled>Remove selected</button>
  </div>
</div>

<script src="/curate/curate.js"></script>
</body>
</html>
